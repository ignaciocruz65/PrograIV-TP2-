<div class="auth-shell d-flex align-items-center justify-content-center">
  <div class="glass-card auth-card p-5 w-100 shadow-lg">
    <div class="text-center mb-4">
      <i class="bi bi-person-circle display-1 text-primary mb-3"></i>
      <h1 class="h2 fw-bold text-gradient">¡Bienvenido!</h1>
      <p class="auth-subtitle">Ingresa a tu cuenta de Red Social</p>
    </div>

    <div class="d-flex justify-content-center gap-3 mb-4">
      <button type="button" class="btn btn-outline-info" (click)="ingresoRapido('admin')" [disabled]="cargando()">
        Entrar como Admin
      </button>
      <button type="button" class="btn btn-outline-success" (click)="ingresoRapido('usuario')" [disabled]="cargando()">
        Entrar como Usuario
      </button>
    </div>

    <form [formGroup]="formulario" (ngSubmit)="enviar()">
      <div class="mb-4">
        <label class="form-label fw-semibold small text-uppercase opacity-75">Usuario o Correo</label>
        <div class="input-group">
          <span class="input-group-text glass-input border-end-0">
            <i class="bi bi-envelope-at"></i>
          </span>
          <input type="text" maxlength="50" formControlName="usuarioOCorreo"
            class="form-control glass-input border-start-0" placeholder="ejemplo@correo.com"
            [class.is-invalid]="invalido('usuarioOCorreo')">
        </div>
        @if (invalido('usuarioOCorreo')) {
        <div class="text-danger small mt-2">
          Ingresa un usuario o correo válido (mín. 3 caracteres).
        </div>
        }
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold small text-uppercase opacity-75">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text glass-input border-end-0">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" maxlength="20" formControlName="contrasena"
            class="form-control glass-input border-start-0" placeholder="••••••••"
            [class.is-invalid]="invalido('contrasena')">
        </div>
        @if (invalido('contrasena')) {
        <div class="text-danger small mt-2">
          {{ obtenerErrorContrasena() }}
        </div>
        }
      </div>

      <button type="submit" class="btn btn-arcade btn-arcade-primary w-100 py-3 mb-4 shadow-sm" [disabled]="cargando()">
        @if (cargando()) {
        <span class="spinner-border spinner-border-sm me-2"></span> Entrando...
        } @else {
        Iniciar Sesión
        }
      </button>

      <div class="text-center">
        <p class="mb-0 small opacity-75">
          ¿No tienes cuenta?
          <a routerLink="/registro" class="text-primary fw-bold text-decoration-none">Regístrate gratis</a>
        </p>
      </div>
    </form>
  </div>
</div>

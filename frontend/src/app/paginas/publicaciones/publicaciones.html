<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="glass-card p-4 shadow-sm mb-5 border border-primary" appZoomHover>
        <h4 class="mb-3">¿Qué estás pensando?</h4>

        <form (submit)="enviarPublicacion($event)">
          <div class="mb-3">
            <input type="text" name="titulo" class="form-control mb-2 bg-dark text-white"
              placeholder="Título de tu post..." appIluminarInput>
            <textarea name="descripcion" class="form-control bg-dark text-white" rows="3"
              placeholder="Escribí tu mensaje acá..." appIluminarInput></textarea>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <input type="file" name="imagen" class="form-control w-auto bg-dark text-white" accept="image/*">
            <button type="submit" class="btn btn-primary fw-bold">
              <i class="bi bi-send-fill me-1"></i> Publicar
            </button>
          </div>
        </form>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 text-gradient m-0">Últimos Posteos</h2>
        <select class="form-select w-auto bg-dark text-white" (change)="cambiarOrden($event)">
          <option value="fecha">Más recientes</option>
          <option value="likes">Más populares</option>
        </select>
      </div>

      @for (item of servicioPub.publicaciones(); track item.id) {
      <app-postear [post]="item"></app-postear>
      } @empty {
      <p class="text-center text-muted mt-5">Nadie publicó nada todavía.</p>
      }



      <div class="d-flex justify-content-between align-items-center mt-4 mb-5">
        <button class="btn btn-outline-light" (click)="paginaAnterior()" [disabled]="salto === 0">
          Anterior
        </button>
        <span class="text-muted">Página {{ (salto / limite) + 1 }}</span>
        <button class="btn btn-outline-light" (click)="paginaSiguiente()"
          [disabled]="servicioPub.publicaciones().length < limite">
          Siguiente
        </button>
      </div>
    </div>
  </div>
</div>
